spring.application.name=moeda-estudantil

# PostgreSQL (Dinâmico)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (Remova o Dialect conforme aviso do log)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ (IMPORTANTE: Se você não tem um RabbitMQ na nuvem, ele vai travar o app)
# Se você não usa RabbitMQ agora, comente ou remova essas linhas.
# Se usar, precisará das variáveis:
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

