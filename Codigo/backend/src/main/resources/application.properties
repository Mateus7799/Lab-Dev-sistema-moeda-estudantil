spring.application.name=moeda-estudantil

server.port=${PORT:8080}

# Banco de Dados (Apontando para Variáveis de Ambiente)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações de Pool para performance (Otimização para o Render)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Dialeto e JPA (Adicionada a linha database-platform)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.connection.release_mode=after_transaction

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}
spring.rabbitmq.ssl.enabled=true
spring.rabbitmq.connection-timeout=5000
spring.rabbitmq.requested-heartbeat=30s

# Email (Certifique-se de usar a variável de ambiente MAIL_PASSWORD no Render)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=moedaestudantil56@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URL do frontend
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# CORS
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,https://seu-frontend-vercel.app}
